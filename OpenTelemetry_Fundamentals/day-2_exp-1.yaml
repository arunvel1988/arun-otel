 border-radius:20px;

 padding:25px;

 margin:20px 0;

 box-shadow:0 10px 30px #0008;

 transition:.3s;

}


.card:hover{

 transform:translateY(-5px);

}



.grid{

 display:grid;

 grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

