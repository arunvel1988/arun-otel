</head>




<body>





<div class="header">

<h1>Grafana Mimir as Long Term Metrics Storage</h1>

<p>
How companies store billions of metrics for months and years
</p>

</div>





<section>






<div class="card">


<h2>The Problem With Only Prometheus</h2>


<p>

Imagine a small ecommerce application.

</p>



<div class="flow">


<div class="box">

Flask Ecommerce Application

</div>


<div class="arrow">↓</div>


<div class="box">

Prometheus

</div>


<div class="arrow">↓</div>


<div class="box">

Grafana Dashboard

</div>


</div>



<p>

This works perfectly in the beginning.

</p>



<p>

But after company growth:

</p>


<ul>

<li>1000 microservices</li>

<li>Millions of users</li>

<li>Millions of metrics every second</li>

<li>Need to store data for years</li>

</ul>




Problems start:



<div class="code">

Prometheus server disk becomes huge


Queries become slow


Single machine has limits


Long term storage becomes difficult

</div>



</div>









<div class="card">


<h2>Why Mimir Was Created?</h2>



<p>

Mimir provides a horizontally scalable Prometheus compatible metrics database.

</p>



<p>

Simple meaning:

</p>



<div class="code">

Prometheus:

Great for one server




Mimir:

Prometheus experience

+

Cloud scale storage

+

Years of metrics

</div>



</div>











<div class="card">


<h2>Real Ecommerce Example</h2>



<p>

Small shop:

</p>


<div class="code">

10 APIs


100 metrics


Prometheus works

</div>




Large company:


<div class="code">

5000 services


10 billion metrics


2 years retention


Multiple teams


Need Mimir

</div>



</div>









<div class="card">


<h2>How Metrics Enter Mimir</h2>



<p>

Applications do not usually send directly to Mimir.

Collectors send using remote write.

</p>



<div class="flow">


<div class="box">

Ecommerce Services

</div>


<div class="arrow">↓</div>


<div class="box">

OpenTelemetry / Prometheus Metrics

</div>



<div class="arrow">↓</div>



<div class="box">

Grafana Alloy

</div>



<div class="arrow">↓</div>



<div class="box">

Remote Write

</div>



<div class="arrow">↓</div>



<div class="box">

Grafana Mimir

</div>



</div>



</div>









<div class="card">


<h2>Mimir High Level Architecture</h2>




<div class="flow">


<div class="box">

Remote Write Request

</div>


<div class="arrow">↓</div>


<div class="box">

Distributor

Validate metrics

Find correct tenant

</div>



<div class="arrow">↓</div>




<div class="box">

Ingester

Receive metrics

Keep recent data

Create blocks

</div>



<div class="arrow">↓</div>



<div class="box">

Object Storage

S3 / MinIO

Store metric blocks

</div>



<div class="arrow">↓</div>



<div class="box">

Querier

Reads stored metrics

</div>



<div class="arrow">↓</div>




<div class="box">

Grafana

Shows dashboards

</div>




</div>



</div>










<div class="card">


<h2>1. Distributor Component</h2>



<p>

Distributor is the entry gate of Mimir.

</p>


When Alloy sends metrics:



<div class="code">

cart_count_total


checkout_count_total


payment_error_total


</div>




Distributor:

<ul>

<li>Receives metrics</li>

<li>Checks if data is valid</li>

<li>Checks tenant information</li>

<li>Distributes data to ingesters</li>

</ul>



Think:

<div class="code">

Distributor = Traffic controller

</div>




</div>









<div class="card">


<h2>2. Ingester Component</h2>



<p>

Ingester handles incoming metric data.

</p>



Responsibilities:


<ul>

<li>Store recent metrics in memory</li>

<li>Create compressed blocks</li>

<li>Upload blocks to object storage</li>

</ul>




Example:



<div class="code">

10:00


cart_count_total=100




11:00


cart_count_total=10000




Ingester creates block


Uploads to S3


</div>



</div>











<div class="card">


<h2>3. Object Storage (S3 / MinIO)</h2>



<p>

This is where long term data actually lives.

</p>



<div class="code">

Mimir

↓

Metric Blocks

↓

S3 / MinIO


Retention:


6 months

1 year

5 years

</div>



<p>

Adding more storage is easier than increasing Prometheus disk.

</p>




</div>









<div class="card">


<h2>4. Querier</h2>



<p>

When Grafana asks a question, Querier finds the answer.

</p>



Example query:



<div class="code">

How many checkouts happened last month?


PromQL:


increase(

checkout_count_total[30d]

)

</div>



Flow:



<div class="flow">


<div class="box">

Grafana Query

</div>


<div class="arrow">↓</div>



<div class="box">

Mimir Querier

</div>



<div class="arrow">↓</div>



<div class="box">

Read Object Storage

</div>




</div>



</div>










<div class="card">


<h2>5. Query Frontend</h2>



<p>

Large queries can be expensive.

Query frontend improves performance.

</p>


It does:


<ul>

<li>Splits big queries</li>

<li>Caches results</li>

<li>Balances query load</li>

</ul>



Example:


<div class="code">

Query:


1 year checkout history




Split:


Jan

Feb

Mar

...


Combine result

</div>



</div>










<div class="card">


<h2>6. Compactor</h2>



<p>

Over time millions of small blocks are created.

Compactor organizes them.

</p>



<div class="code">

Before:


1000 small blocks




After:


10 optimized blocks




Queries become faster

</div>



</div>











<div class="card">


<h2>Complete Production Flow</h2>



<div class="flow">


<div class="box">

Customer clicks checkout

</div>


<div class="arrow">↓</div>


<div class="box">

Application creates metric

</div>



<div class="arrow">↓</div>



<div class="box">

Alloy remote write

</div>



<div class="arrow">↓</div>



<div class="box">

Mimir Distributor

</div>



<div class="arrow">↓</div>



<div class="box">

Ingester

</div>



<div class="arrow">↓</div>



<div class="box">

S3 / MinIO Storage

</div>



<div class="arrow">↓</div>



<div class="box">

Querier

</div>



<div class="arrow">↓</div>



<div class="box">

Grafana Dashboard

</div>




</div>



</div>










<div class="card">


<h2>Simple Memory Rule</h2>



<div class="code">

Prometheus:

Short term metrics

Single server style





Mimir:

Long term metrics

Large scale

Multiple teams





Distributor:

Receives data





Ingester:

Stores incoming metrics





S3 / MinIO:

Permanent storage





Querier:

Reads data for Grafana





Compactor:

Keeps storage optimized


</div>



</div>





</section>



</body>


</html>
