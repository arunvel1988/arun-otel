<!DOCTYPE html>

<html>

<head>

<title>Faro Ecommerce Working Demo</title>

<style>

body {
    background:#111827;
    color:white;
    font-family:Arial;
    padding:40px;
}

button {
    padding:15px;
    margin:10px;
    font-size:20px;
}

</style>


</head>


<body>


<h1>
Ecommerce Frontend Observability
</h1>


<h3>
Grafana Faro -> Alloy -> Loki
</h3>


<button onclick="pageView()">
Page View
</button>


<button onclick="addCart()">
Add Cart
</button>


<button onclick="checkoutError()">
Checkout Error
</button>


<h2 id="result"></h2>





<script>


const FARO_URL = "http://localhost:12347/collect";




function sendFaroLog(message, level){


    fetch(
        FARO_URL,
        {

        method:"POST",


        headers:{

            "Content-Type":"application/json"

        },


        body: JSON.stringify({

            meta: {

                app: {

                    name:"ecommerce",

                    version:"1"

                },

                sdk: {

                    name:"faro-web-sdk",

                    version:"1"

                }

            },


            logs:[

                {

                message:message,

                level:level,

                timestamp:new Date().toISOString()

                }

            ]


        })


        }

    );


}






function pageView(){


    sendFaroLog(

        "USER OPENED HOME PAGE",

        "info"

    );


}







function addCart(){


    sendFaroLog(

        "CUSTOMER ADDED PRODUCT TO CART",

        "info"

    );


    document.getElementById("result").innerHTML=

    "Cart Added";


}







function checkoutError(){



    sendFaroLog(

        "PAYMENT FAILED JAVASCRIPT ERROR",

        "error"

    );


    document.getElementById("result").innerHTML=

    "Payment Failed";


}





// automatic page load event


sendFaroLog(

    "ECOMMERCE APPLICATION LOADED",

    "info"

);



</script>



</body>

</html>
