}



.card{

 background:#1e293b;

 padding:30px;

 margin-bottom:30px;

 border-radius:18px;

 box-shadow:0 10px 25px #0008;

}



h2{

 color:#93c5fd;

}


h3{

 color:#60a5fa;

}



.code{

 background:#020617;

 color:#86efac;

 padding:20px;

 border-radius:12px;

 white-space:pre-line;

