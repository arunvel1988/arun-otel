services:

 
  app:

    image: python:3.11

    container_name: app

    volumes:
      - ./app.py:/app.py

    command:
      - sh
      - -c
      - |
        pip install flask prometheus_client
        python /app.py

    ports:
      - "5000:5000"




  alloy:

    image: grafana/alloy:latest

    container_name: alloy


    volumes:
      - ./config.alloy:/etc/alloy/config.alloy


    command:
      - run
      - /etc/alloy/config.alloy


    ports:
      - "12345:12345"


    depends_on:
      - app
      - mimir





  mimir:


    image: grafana/mimir:latest


    container_name: mimir


    command:
      - -config.file=/etc/mimir.yml


    volumes:

      - ./mimir.yml:/etc/mimir.yml

      # rules available here
      - ./:/rules


    ports:

      - "9009:9009"





  grafana:


    image: grafana/grafana:latest


    container_name: grafana


    ports:

      - "3000:3000"


    environment:

      GF_SECURITY_ADMIN_USER: admin

      GF_SECURITY_ADMIN_PASSWORD: admin


    depends_on:

      - mimir





  mimirtool:


    image: grafana/mimirtool:latest


    container_name: mimirtool


    volumes:

      - ./:/demo


    entrypoint:

      - /mimirtool


    depends_on:

      - mimir
