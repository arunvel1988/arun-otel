deploymentMode: SimpleScalable

loki:

  auth_enabled: true

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    bucketNames:
      chunks: loki-data
      ruler: loki-data
      admin: loki-data

    type: s3

    s3:
      endpoint: 34.14.184.202:9000
      accessKeyId: admin
      secretAccessKey: password123
      s3ForcePathStyle: true
      insecure: true

  limits_config:
    reject_old_samples: false
    allow_structured_metadata: false

  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 5m

write:
  replicas: 1

read:
  replicas: 1

backend:
  replicas: 1

gateway:
  enabled: true

minio:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

monitoring:
  dashboards:
    enabled: true

  rules:
    enabled: true

  serviceMonitor:
    enabled: false

  selfMonitoring:
    enabled: false

test:
  enabled: false
