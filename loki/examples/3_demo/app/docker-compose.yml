version: "3.9"

services:

  app:
    build: ./app
    volumes:
      - logs:/logs

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - /etc/alloy/config.alloy
    volumes:
      - ./alloy/alloy-bad.alloy:/etc/alloy/config.alloy
      - logs:/logs

  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./loki/loki-no-limit.yaml:/etc/loki/loki.yaml
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:latest

    ports:
      - "3000:3000"

    volumes:
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml

volumes:
  logs: