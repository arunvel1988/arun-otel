auth_enabled: false


server:

  http_listen_port: 3100



common:

  path_prefix: /loki


  replication_factor: 1


  ring:

    kvstore:

      store: inmemory



schema_config:


  configs:


    - from: 2024-01-01


      store: tsdb


      object_store: s3


      schema: v13


      index:

        prefix: index_

        period: 24h




storage_config:


 aws:


    endpoint: minio:9000


    bucketnames: loki-data


    access_key_id: admin


    secret_access_key: password123


    insecure: true


    s3forcepathstyle: true
