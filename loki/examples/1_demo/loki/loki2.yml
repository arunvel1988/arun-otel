auth_enabled: true


server:
  http_listen_port: 3100


common:

  path_prefix: /loki

  replication_factor: 1

  ring:

    kvstore:

      store: inmemory



schema_config:

  configs:

    - from: 2024-01-01

      store: tsdb

      object_store: s3

      schema: v13

      index:

        prefix: index_

        period: 24h



storage_config:

  aws:

    endpoint: minio:9000

    bucketnames: loki-data

    access_key_id: admin

    secret_access_key: password123

    insecure: true

    s3forcepathstyle: true



ingester:


  lifecycler:


    address: 127.0.0.1


    ring:


      kvstore:


        store: inmemory


      replication_factor: 1



  # for demo - flush fast to MinIO

  chunk_idle_period: 30s


  chunk_retain_period: 5s


  max_chunk_age: 1m



limits_config:


  reject_old_samples: false


  allow_structured_metadata: false



compactor:


  working_directory: /tmp/loki/compactor


  compaction_interval: 1m



querier:


  max_concurrent: 4
